# Release gate — build the bear-harness engine and publish it to PyPI on a version tag.
#
# Trigger: push a tag like `v0.2.0`. The job builds an sdist+wheel from the canonical root
# pyproject.toml (name = bear-harness, dynamic version from src/bear_harness/__about__.py) and
# publishes via PyPI TRUSTED PUBLISHING (OIDC) — no API token in repo secrets.
#
# ONE-TIME SETUP (pypi.org, by the maintainer, before the first release):
#   1. Register/claim the `bear-harness` project name (and defensively `bearpilot`).
#   2. Add a Trusted Publisher: owner `jaymd96`, repo `bearpilot`, workflow `release.yml`,
#      environment `pypi`. A "pending publisher" works before the project's first upload.
#   3. Enable 2FA on the PyPI account.
#
# RELEASE FLOW: bump src/bear_harness/__about__.py AND bearpilot/harness/engine.pin together
# (checks/check-engine-pin.sh enforces they match), commit, then `git tag vX.Y.Z && git push --tags`.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches the package version
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(sed -n 's/.*__version__ = "\([^"]*\)".*/\1/p' src/bear_harness/__about__.py | head -1)"
          pin="$(grep -v '^[[:space:]]*#' bearpilot/harness/engine.pin | grep -v '^[[:space:]]*$' | head -1 | tr -d '[:space:]')"
          echo "tag=$tag  __about__=$pkg  engine.pin=$pin"
          [ "$tag" = "$pkg" ] || { echo "::error::tag v$tag != __about__.py $pkg"; exit 1; }
          [ "$tag" = "$pin" ] || { echo "::error::tag v$tag != engine.pin $pin"; exit 1; }
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC — required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
