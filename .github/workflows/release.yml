# Release gate — build the bear-harness engine and publish it to PyPI on a version tag.
#
# Trigger: push a tag like `v0.2.0`. The job builds an sdist+wheel from the canonical root
# pyproject.toml (name = bear-harness, dynamic version from src/bear_harness/__about__.py) and
# publishes with `hatch publish`, authenticating from two repo secrets:
#   HATCH_INDEX_USER  (normally `__token__`)
#   HATCH_INDEX_AUTH  (a PyPI API token, `pypi-...`)
#
# ONE-TIME SETUP (by the maintainer, before the first release):
#   - Set the two repo secrets (see the PR description / README for the `gh secret set` one-liners).
#   - The token must be ACCOUNT-scoped for the FIRST publish (it has to create the `bear-harness`
#     project); a project-scoped token only works once the project already exists.
#
# (Alternative: token-less PyPI Trusted Publishing via OIDC — `pypa/gh-action-pypi-publish` with
#  `permissions: id-token: write`. We use token auth here per the maintainer's existing setup.)
#
# RELEASE FLOW: bump src/bear_harness/__about__.py AND bearpilot/harness/engine.pin together
# (checks/check-engine-pin.sh enforces they match), commit, then `git tag vX.Y.Z && git push --tags`.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify the tag matches the package version and the engine pin
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(sed -n 's/.*__version__ = "\([^"]*\)".*/\1/p' src/bear_harness/__about__.py | head -1)"
          pin="$(grep -v '^[[:space:]]*#' bearpilot/harness/engine.pin | grep -v '^[[:space:]]*$' | head -1 | tr -d '[:space:]')"
          echo "tag=$tag  __about__=$pkg  engine.pin=$pin"
          [ "$tag" = "$pkg" ] || { echo "::error::tag v$tag != __about__.py $pkg"; exit 1; }
          [ "$tag" = "$pin" ] || { echo "::error::tag v$tag != engine.pin $pin"; exit 1; }
      - name: Build + publish to PyPI (hatch, token auth)
        env:
          HATCH_INDEX_USER: ${{ secrets.HATCH_INDEX_USER }}
          HATCH_INDEX_AUTH: ${{ secrets.HATCH_INDEX_AUTH }}
        run: |
          set -eu
          test -n "${HATCH_INDEX_AUTH:-}" || { echo "::error::HATCH_INDEX_AUTH secret is not set on the repo"; exit 1; }
          python -m pip install --upgrade hatch
          hatch build
          hatch publish --no-prompt
